<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoangkun Creative Hub</title>
    <style>
        /* Reset & Nền */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Hiệu ứng hạt bay (Canvas) */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; z-index: 0;
        }

        /* Container chính - Glassmorphism */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Đồng hồ */
        #clock {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* To-do List */
        .todo-section {
            margin-top: 30px;
            text-align: left;
        }
        input {
            width: 75%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            background: #00d2ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #3a7bd5; transform: scale(1.05); }

        ul { list-style: none; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 5px;
            padding: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; translateX: -10px; }
            to { opacity: 1; translateX: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="glass-card">
        <h2 style="margin-bottom: 10px;">XIN CHÀO!</h2>
        <div id="clock">00:00:00</div>
        <p id="date">Thứ Ba, 24 Tháng 2, 2026</p>

        <div class="todo-section">
            <h4>Nhiệm vụ hôm nay:</h4>
            <div style="display:flex; gap: 5px; margin-top: 10px;">
                <input type="text" id="todo-input" placeholder="Nhập việc cần làm...">
                <button onclick="addTodo()">Thêm</button>
            </div>
            <ul id="todo-list">
                </ul>
        </div>
    </div>

    <script>
        // 1. Xử lý Đồng hồ
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Xử lý To-do List
        function addTodo() {
            const input = document.getElementById('todo-input');
            const val = input.value;
            if (val === '') return;

            const li = document.createElement('li');
            li.innerHTML = `${val} <span style="cursor:pointer; color:#ff4b2b" onclick="this.parentElement.remove()">✕</span>`;
            document.getElementById('todo-list').appendChild(li);
            input.value = '';
        }

        // 3. Hiệu ứng Hạt (Particles) Nền
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();
    </script>
</body>
</html>
